name: Release

on:
  # 人工在 GitHub UI 发布 Release 时会触发；release-please 自动发布请走 release-please.yml。
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to build (e.g. easiflux-desktop-tauri-v0.3.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/tauri-build-reusable.yml
    with:
      tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
    secrets: inherit
