name: Bug 报告
description: 报告可复现的功能异常或崩溃
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请勿在 Issue 中粘贴 API Key、API Secret 或其他敏感信息。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请清晰描述实际发生了什么。
      placeholder: 描述异常现象及其影响。
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请提供能够稳定复现问题的最小步骤。
      placeholder: |
        1. 打开……
        2. 点击……
        3. 出现……
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      placeholder: 描述你预期看到的结果。
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows
        - macOS
        - Linux
        - 其他
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 应用版本
      description: 可在应用界面或安装包信息中查看。
      placeholder: 例如 0.3.0
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: API 环境
      options:
        - 正式环境
        - 开发/测试环境
        - 不确定
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志与截图
      description: 请删除凭据、账户标识等敏感信息后再粘贴。
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 可补充网络环境、发生频率或相关 Issue。

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，未发现相同问题。
          required: true
        - label: 我已确认内容中不包含 API Key、API Secret 等敏感信息。
          required: true
