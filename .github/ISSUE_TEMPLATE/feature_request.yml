name: 功能建议
description: 提议新功能或改进现有体验
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: 感谢你的建议。请优先说明要解决的问题，而不只是具体实现方式。

  - type: textarea
    id: problem
    attributes:
      label: 使用场景与问题
      description: 当前场景中遇到了什么限制或不便？
      placeholder: 当我……时，希望能够……，因为……
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述期望的交互、行为或接口。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 是否尝试过其他方式？为什么不能满足需求？

  - type: dropdown
    id: area
    attributes:
      label: 涉及模块
      options:
        - 行情与 K 线
        - 下单与订单管理
        - 持仓与账户
        - WebSocket 与连接
        - 设置与配置
        - 桌面应用与打包
        - 开发工具与文档
        - 其他
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 可附上草图、参考产品或相关 Issue。

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，未发现相同建议。
          required: true
        - label: 该建议不要求嵌入 Python SDK 或 Python 运行时。
          required: true
